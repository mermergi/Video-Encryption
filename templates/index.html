<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Encryption Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .mode-btn:hover {
            border-color: #667eea;
        }

        .mode-btn.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .file-size {
            color: #666;
            font-size: 12px;
        }

        .password-input-area {
            margin-bottom: 20px;
        }

        .password-row {
            display: flex;
            gap: 8px;
        }

        .password-row input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .password-row input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .toggle-btn {
            padding: 12px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .progress-container {
            display: none;
            margin-bottom: 20px;
        }

        .progress-container.show {
            display: block;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .progress-step {
            color: #333;
            font-weight: 500;
        }

        .progress-percent {
            color: #667eea;
            font-weight: 600;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-message {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .result-container {
            display: none;
            text-align: center;
            padding: 20px;
            background: #f0fff4;
            border-radius: 10px;
            margin-top: 20px;
        }

        .result-container.show {
            display: block;
        }

        .success-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .result-text {
            color: #333;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Video Encryption Tool</h1>
            <p>AES-256 encrypted video files — password-protected</p>
        </div>

        <div class="alert alert-error" id="errorAlert"></div>
        <div class="alert alert-success" id="successAlert"></div>

        <!-- Mode selector -->
        <div class="mode-selector">
            <button class="mode-btn active" id="encryptBtn" onclick="setMode('encrypt')">
                Encrypt
            </button>
            <button class="mode-btn" id="decryptBtn" onclick="setMode('decrypt')">
                Decrypt
            </button>
        </div>

        <!-- Password input (always visible) -->
        <div class="password-input-area">
            <label style="display:block; margin-bottom:6px; color:#555; font-size:14px; font-weight:500;">
                Password
            </label>
            <div class="password-row">
                <input type="password" id="passwordInput" placeholder="Enter password (min 8 characters)">
                <button class="toggle-btn" id="togglePasswordBtn" onclick="togglePassword()">Show</button>
            </div>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon"></div>
            <div class="upload-text">Click or drag video file here</div>
            <div class="upload-hint">Supports MP4, AVI, MOV, etc. Max 500MB</div>
        </div>

        <input type="file" id="fileInput" accept="video/*">

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-info">
                <span class="progress-step" id="progressStep">Preparing</span>
                <span class="progress-percent" id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-message" id="progressMessage">Initializing...</div>
        </div>

        <button class="btn btn-primary" id="processBtn" disabled>
            Start Processing
        </button>

        <div class="result-container" id="resultContainer">
            <div class="result-text">Processing complete!</div>
            <button class="btn btn-success" id="downloadBtn">
                Download
            </button>
        </div>
    </div>

    <script>
        // DOM elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const processBtn = document.getElementById('processBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const progressStep = document.getElementById('progressStep');
        const progressMessage = document.getElementById('progressMessage');
        const resultContainer = document.getElementById('resultContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');
        const passwordInput = document.getElementById('passwordInput');

        let selectedFile = null;
        let progressInterval = null;
        let currentMode = 'encrypt';

        // Toggle password visibility
        function togglePassword() {
            const btn = document.getElementById('togglePasswordBtn');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                btn.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                btn.textContent = 'Show';
            }
        }

        // Set mode
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('encryptBtn').classList.toggle('active', mode === 'encrypt');
            document.getElementById('decryptBtn').classList.toggle('active', mode === 'decrypt');
            processBtn.textContent = mode === 'encrypt' ? 'Encrypt' : 'Decrypt';
        }

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                handleFile(file);
            } else {
                showError('Please upload a video file');
            }
        });

        function handleFile(file) {
            if (!file) return;
            if (!file.type.startsWith('video/')) {
                showError('Please upload a video file');
                return;
            }
            if (file.size > 500 * 1024 * 1024) {
                showError('File size must not exceed 500MB');
                return;
            }
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.classList.add('show');
            processBtn.disabled = false;
            hideAlert();
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const password = passwordInput.value;
            if (!password) {
                showError('Please enter a password');
                return;
            }
            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }

            processBtn.disabled = true;
            progressContainer.classList.add('show');
            resultContainer.classList.remove('show');

            try {
                updateProgressUI('upload', 0, 'Uploading...');
                const formData = new FormData();
                formData.append('file', selectedFile);

                const uploadResponse = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const uploadResult = await uploadResponse.json();
                if (!uploadResult.success) {
                    throw new Error(uploadResult.message);
                }

                updateProgressUI('upload', 100, 'Upload complete');

                const processResponse = await fetch('/api/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        file_path: uploadResult.file_path,
                        password: password,
                        mode: currentMode
                    })
                });

                const processResult = await processResponse.json();
                if (!processResult.success) {
                    throw new Error(processResult.message);
                }

                startProgressPolling();

            } catch (error) {
                showError(error.message);
                processBtn.disabled = false;
                progressContainer.classList.remove('show');
            }
        });

        function updateProgressUI(step, percent, message) {
            progressStep.textContent = step;
            progressFill.style.width = percent + '%';
            progressPercent.textContent = Math.round(percent) + '%';
            progressMessage.textContent = message;
        }

        function startProgressPolling() {
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(async () => {
                try {
                    const response = await fetch('/api/progress');
                    const data = await response.json();
                    updateProgressUI(data.current_step, data.progress, data.message);
                    if (data.status === 'completed') {
                        clearInterval(progressInterval);
                        resultContainer.classList.add('show');
                        processBtn.disabled = false;
                        showSuccess(currentMode === 'encrypt' ? 'Encryption complete!' : 'Decryption complete!');
                    } else if (data.status === 'error') {
                        clearInterval(progressInterval);
                        showError(data.message);
                        processBtn.disabled = false;
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                }
            }, 1000);
        }

        downloadBtn.addEventListener('click', () => {
            window.location.href = '/api/download';
        });

        function showError(message) {
            errorAlert.textContent = message;
            errorAlert.classList.add('show');
            successAlert.classList.remove('show');
        }

        function showSuccess(message) {
            successAlert.textContent = message;
            successAlert.classList.add('show');
            errorAlert.classList.remove('show');
        }

        function hideAlert() {
            errorAlert.classList.remove('show');
            successAlert.classList.remove('show');
        }
    </script>
</body>
</html>
