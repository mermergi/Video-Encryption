<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频混淆处理工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .mode-btn:hover {
            border-color: #667eea;
        }

        .mode-btn.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .file-size {
            color: #666;
            font-size: 12px;
        }

        .progress-container {
            display: none;
            margin-bottom: 20px;
        }

        .progress-container.show {
            display: block;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .progress-step {
            color: #333;
            font-weight: 500;
        }

        .progress-percent {
            color: #667eea;
            font-weight: 600;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-message {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .result-container {
            display: none;
            text-align: center;
            padding: 20px;
            background: #f0fff4;
            border-radius: 10px;
            margin-top: 20px;
        }

        .result-container.show {
            display: block;
        }

        .success-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .result-text {
            color: #333;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 视频混淆处理工具</h1>
            <p>支持混淆加密和解密还原，可逆算法保证数据安全</p>
        </div>

        <div class="alert alert-error" id="errorAlert"></div>
        <div class="alert alert-success" id="successAlert"></div>

        <!-- 模式选择 -->
        <div class="mode-selector">
            <button class="mode-btn active" id="obfuscateBtn" onclick="setMode('obfuscate')">
                🔒 混淆加密
            </button>
            <button class="mode-btn" id="deobfuscateBtn" onclick="setMode('deobfuscate')">
                🔓 解密还原
            </button>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽视频文件到此处</div>
            <div class="upload-hint">支持 MP4、AVI、MOV 等格式，最大 500MB</div>
        </div>

        <input type="file" id="fileInput" accept="video/*">

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-info">
                <span class="progress-step" id="progressStep">准备中</span>
                <span class="progress-percent" id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-message" id="progressMessage">正在初始化...</div>
        </div>

        <button class="btn btn-primary" id="processBtn" disabled>
            开始处理
        </button>

        <div class="result-container" id="resultContainer">
            <div class="success-icon">✅</div>
            <div class="result-text">视频处理完成！</div>
            <button class="btn btn-success" id="downloadBtn">
                下载处理后的视频
            </button>
        </div>
    </div>

    <script>
        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const processBtn = document.getElementById('processBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const progressStep = document.getElementById('progressStep');
        const progressMessage = document.getElementById('progressMessage');
        const resultContainer = document.getElementById('resultContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');

        let selectedFile = null;
        let progressInterval = null;
        let currentMode = 'obfuscate'; // 'obfuscate' 或 'deobfuscate'

        // 设置模式
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('obfuscateBtn').classList.toggle('active', mode === 'obfuscate');
            document.getElementById('deobfuscateBtn').classList.toggle('active', mode === 'deobfuscate');
            
            // 更新按钮文字
            if (mode === 'obfuscate') {
                processBtn.textContent = '开始混淆';
            } else {
                processBtn.textContent = '开始解密';
            }
        }

        // 点击上传区域
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                handleFile(file);
            } else {
                showError('请上传视频文件');
            }
        });

        // 处理文件
        function handleFile(file) {
            if (!file) return;

            // 验证文件类型
            if (!file.type.startsWith('video/')) {
                showError('请上传视频文件');
                return;
            }

            // 验证文件大小 (500MB)
            if (file.size > 500 * 1024 * 1024) {
                showError('文件大小不能超过 500MB');
                return;
            }

            selectedFile = file;

            // 显示文件信息
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.classList.add('show');
            processBtn.disabled = false;

            hideAlert();
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 开始处理
        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // 禁用按钮
            processBtn.disabled = true;
            progressContainer.classList.add('show');
            resultContainer.classList.remove('show');

            try {
                // 上传文件
                updateProgressUI('upload', 0, '正在上传文件...');
                const formData = new FormData();
                formData.append('file', selectedFile);

                const uploadResponse = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const uploadResult = await uploadResponse.json();

                if (!uploadResult.success) {
                    throw new Error(uploadResult.message);
                }

                updateProgressUI('upload', 100, '文件上传完成');

                // 开始处理 - 根据模式选择不同的API
                const processUrl = currentMode === 'obfuscate' ? '/api/process' : '/api/deobfuscate';
                
                const processResponse = await fetch(processUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        file_path: uploadResult.file_path,
                        output_name: 'output'
                    })
                });

                const processResult = await processResponse.json();

                if (!processResult.success) {
                    throw new Error(processResult.message);
                }

                // 开始轮询进度
                startProgressPolling();

            } catch (error) {
                showError(error.message);
                processBtn.disabled = false;
                progressContainer.classList.remove('show');
            }
        });

        // 更新进度UI
        function updateProgressUI(step, percent, message) {
            const steps = {
                'upload': '上传文件',
                'split': '分割视频',
                'merge': '合成视频',
                'done': '处理完成'
            };

            progressStep.textContent = steps[step] || step;
            progressFill.style.width = percent + '%';
            progressPercent.textContent = Math.round(percent) + '%';
            progressMessage.textContent = message;
        }

        // 轮询进度
        function startProgressPolling() {
            if (progressInterval) {
                clearInterval(progressInterval);
            }

            progressInterval = setInterval(async () => {
                try {
                    const response = await fetch('/api/progress');
                    const data = await response.json();

                    updateProgressUI(
                        data.current_step,
                        data.progress,
                        data.message
                    );

                    if (data.status === 'completed') {
                        clearInterval(progressInterval);
                        resultContainer.classList.add('show');
                        processBtn.disabled = false;
                        showSuccess(currentMode === 'obfuscate' ? '视频混淆完成！' : '视频解密完成！');
                    } else if (data.status === 'error') {
                        clearInterval(progressInterval);
                        showError(data.message);
                        processBtn.disabled = false;
                    }
                } catch (error) {
                    console.error('获取进度失败:', error);
                }
            }, 1000);
        }

        // 下载
        downloadBtn.addEventListener('click', () => {
            window.location.href = '/api/download';
        });

        // 显示错误
        function showError(message) {
            errorAlert.textContent = message;
            errorAlert.classList.add('show');
            successAlert.classList.remove('show');
        }

        // 显示成功
        function showSuccess(message) {
            successAlert.textContent = message;
            successAlert.classList.add('show');
            errorAlert.classList.remove('show');
        }

        // 隐藏提示
        function hideAlert() {
            errorAlert.classList.remove('show');
            successAlert.classList.remove('show');
        }
    </script>
</body>
</html>
